<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Budget Wise Naija | Money Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="summary">
      <p class="eyebrow">Naija personal finance lab</p>
      <h1>Budget Wise Naija</h1>
      <div class="metrics">
        <article><span>Balance</span><strong id="balance">$0</strong></article>
        <article><span>Income</span><strong id="income">$0</strong></article>
        <article><span>Expenses</span><strong id="expenses">$0</strong></article>
      </div>
      <label>Savings goal <input id="goal" type="number" value="500000"></label>
      <progress id="progress" value="0" max="100"></progress>
      <p id="goalMessage">Set a savings goal to start.</p>
    </section>

    <section class="workspace">
      <form id="entryForm">
        <input id="label" placeholder="Description" required>
        <input id="amount" type="number" min="1" step="1" placeholder="Amount" required>
        <select id="category">
          <option>Salary</option>
          <option>Freelance</option>
          <option>Foodstuff</option>
          <option>Transport</option>
          <option>Data</option>
          <option>School</option>
          <option>Soft Life</option>
        </select>
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <button>Add</button>
      </form>

      <section class="insights">
        <article><span>Top spend category</span><strong id="topCategory">None</strong></article>
        <article><span>Budget health</span><strong id="health">Getting started</strong></article>
      </section>

      <div class="toolbar">
        <button id="seedDemo">Load demo month</button>
        <button id="clearAll">Clear all</button>
      </div>

      <div id="entries"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
